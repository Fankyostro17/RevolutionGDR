name: revolution_gdr
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  audioplayers: ^6.1.0
  file_picker: ^8.1.2
  socket_io_client: ^2.0.3
  share_plus: ^10.0.2
  app_links: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo/logo.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/logo/logo.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/svg/
    - assets/audio/
    - assets/sfx/
    - assets/images/logo/